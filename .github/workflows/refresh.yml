name: Refresh Zurich fund data

on:
  push:
    paths:
      - ".github/workflows/refresh.yml"
      - "scripts/update_zurich_funds.py"
      - "scripts/encrypt_funds.py"
  schedule:
    - cron: "20 3 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-zurich-fund-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scraper dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cryptography

      - name: Refresh fund data
        run: python scripts/update_zurich_funds.py --output data/funds.raw.json

      - name: Encrypt fund data
        env:
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: |
          python scripts/encrypt_funds.py --input data/funds.raw.json --output data/funds.enc.json
          rm data/funds.raw.json

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: refresh Zurich fund data"
          file_pattern: data/funds.enc.json
